services:
  frappe:
    build: .
    image: custom-frappe-dev
    ports:
      - "8000:8000"  # Web server
      - "8080:8080"  # Frontend asset watcher (Vite hot-reload)
      - "9000:9000"  # Socket.IO
    volumes:
      # Mount the Windows host's apps folder into a safe staging area
      - ./apps:/opt/custom_apps
      # Persist the sites folder so database configs and uploaded files aren't lost
      - frappe_sites:/home/frappe/frappe-bench/sites
    environment:
      - DB_HOST=db
      - REDIS_CACHE=redis-cache
      - REDIS_QUEUE=redis-queue
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:6.2-alpine

  redis-queue:
    image: redis:6.2-alpine

volumes:
  db_data:
  frappe_sites: