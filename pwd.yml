services:
  backend:
    build: .
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    command:
      - bash
      - -c
      - >
        set -e;
        echo "Installing Frappe & ERPNext...";
        pip install -e apps/frappe;
        pip install -e apps/erpnext;
        echo "Installing Custom Apps...";
        for app in apps/*; do
          if [ -d "$$app" ] && { [ -f "$$app/pyproject.toml" ] || [ -f "$$app/setup.py" ]; } && [ "$$app" != "apps/frappe" ] && [ "$$app" != "apps/erpnext" ]; then
             echo "Installing $$app...";
             pip install -e $$app;
          fi
        done;
        echo "Starting Development Server...";
        bench serve --port 8000 --host 0.0.0.0 --noreload

  configurator:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        set -e;
        pip install -e apps/frappe;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -gp developer_mode 1;
        bench set-config -gp server_script_enabled 1;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps

  create-site:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps
    entrypoint:
      - bash
      - -c
    command:
      - >
        set -e;
        pip install -e apps/frappe;
        pip install -e apps/erpnext;
        for app in apps/*; do
          if [ -d "$$app" ] && { [ -f "$$app/pyproject.toml" ] || [ -f "$$app/setup.py" ]; } && [ "$$app" != "apps/frappe" ] && [ "$$app" != "apps/erpnext" ]; then
             pip install -e $$app;
          fi
        done;
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=admin --db-root-username=root --db-root-password=admin --install-app erpnext --set-default frontend --force;
        bench --site frontend install-app document_management_system;
        bench --site frontend install-app itsm;

  db:
    image: mariadb:10.6
    networks:
      - frappe_network
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 1s
      retries: 20
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: custom-frappe:latest
    networks:
      - frappe_network
    depends_on:
      - websocket
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
      OFF_RECONFIG: "false"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps
    ports:
      - "8080:8080"

  queue-long:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bash
      - -c
      - >
        set -e;
        pip install -e apps/frappe;
        pip install -e apps/erpnext;
        for app in apps/*; do
          if [ -d "$$app" ] && { [ -f "$$app/pyproject.toml" ] || [ -f "$$app/setup.py" ]; } && [ "$$app" != "apps/frappe" ] && [ "$$app" != "apps/erpnext" ]; then
             pip install -e $$app;
          fi
        done;
        bench worker --queue long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bash
      - -c
      - >
        set -e;
        pip install -e apps/frappe;
        pip install -e apps/erpnext;
        for app in apps/*; do
          if [ -d "$$app" ] && { [ -f "$$app/pyproject.toml" ] || [ -f "$$app/setup.py" ]; } && [ "$$app" != "apps/frappe" ] && [ "$$app" != "apps/erpnext" ]; then
             pip install -e $$app;
          fi
        done;
        bench worker --queue short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure

  scheduler:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bash
      - -c
      - >
        set -e;
        pip install -e apps/frappe;
        pip install -e apps/erpnext;
        for app in apps/*; do
          if [ -d "$$app" ] && { [ -f "$$app/pyproject.toml" ] || [ -f "$$app/setup.py" ]; } && [ "$$app" != "apps/frappe" ] && [ "$$app" != "apps/erpnext" ]; then
             pip install -e $$app;
          fi
        done;
        bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps

  websocket:
    image: custom-frappe:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bash
      - -c
      - >
        set -e;
        cd /home/frappe/frappe-bench/apps/frappe;
        npm install;
        node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./apps:/home/frappe/frappe-bench/apps

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge